appId: com.ausverse.ai
productName: Ausverse AI
directories:
  output: dist
  buildResources: .
forceCodeSigning: false

publish:
  provider: github
  owner: hello3928
  repo: ausverse-ai

win:
  target:
    - nsis
  icon: icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Ausverse AI"

files:
  - main.js
  - preload.js
  - agent-preload.js
  - agent-capture-preload.js
  - agent-overlay.html
  - agent-capture.html
  - package.json
  - icon.ico

asar: true

afterPack: ./scripts/after-pack.js
